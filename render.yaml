# Render Blueprint: c2r-mainPage-backend (Connect2Roots Admin API)
# Database: Supabase (set DATABASE_URL in Render Dashboard to your Supabase connection string)
#
# In Render Dashboard → c2r-admin-backend → Environment, set:
#   DATABASE_URL = your Supabase Postgres URL (from Supabase → Project Settings → Database)
#   CORS_ORIGIN  = your frontend URL (e.g. https://your-frontend.onrender.com)
# Default admin after first deploy: admin@connect2roots.org / admin123

services:
  - type: web
    name: c2r-admin-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm run init-db && node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
